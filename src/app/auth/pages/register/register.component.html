<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>
    <form (ngSubmit)="onSubmit()">
        <div class="mb-4">
            <label class="block mb-1 font-semibold">First Name</label>
            <input [(ngModel)]="user.firstName" name="firstName" required
                class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-300" />
        </div>
        <div class="mb-4">
            <label class="block mb-1 font-semibold">Last Name</label>
            <input [(ngModel)]="user.lastName" name="lastName" required
                class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-300" />
        </div>
        <div class="mb-4">
            <label class="block mb-1 font-semibold">Email</label>
            <input [(ngModel)]="user.email" name="email" type="email" required
                class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-300" />
        </div>
        <div class="mb-4">
            <label class="block mb-1 font-semibold">Password</label>
            <input [(ngModel)]="user.password" name="password" type="password" required
                class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-300" />
        </div>
        <div class="mb-4">
            <label class="block mb-1 font-semibold">Phone (optional)</label>
            <input [(ngModel)]="user.phone" name="phone"
                class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-300" />
        </div>
        @if (error) {
            <div class="mb-4 text-red-500">{{ error }}</div>
        }
        <button type="submit"
                class="w-full bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded">
            Register
        </button>
    </form>
  </div>
</div>
