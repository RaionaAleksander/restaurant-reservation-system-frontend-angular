<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
    <form (ngSubmit)="onSubmit()">
        <div class="mb-4">
            <label class="block mb-1 font-semibold">Email</label>
            <input [(ngModel)]="email" name="email" type="email" required
                class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-300" />
        </div>
        <div class="mb-4">
            <label class="block mb-1 font-semibold">Password</label>
            <input [(ngModel)]="password" name="password" type="password" required
                class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-300" />
        </div>
        @if (error) {
            <div class="mb-4 text-red-500">{{ error }}</div>
        }
        <button type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded">
            Login
        </button>
        <div class="mt-4 text-center text-sm">
            <span class="text-gray-600">Don't have account?</span>
            <a routerLink="/register" class="text-blue-500 hover:underline ml-1">
                Register now
            </a>
        </div>
    </form>
  </div>
</div>
